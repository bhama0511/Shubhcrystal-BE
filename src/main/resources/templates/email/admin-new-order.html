<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New order</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:'Segoe UI',Arial,sans-serif;color:#2d2d2d;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

          <tr>
            <td style="background:#5c3d8f;padding:18px 24px;color:#ffffff;">
              <div style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.85;">New order received</div>
              <div style="font-size:22px;font-weight:800;margin-top:4px;">
                #<span th:text="${order.id}">42</span> · ₹<span th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 0, 'POINT')}">2297</span>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 24px;">
              <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:#7b5ea7;margin:0 0 8px;">Customer</h2>
              <p style="font-size:14px;margin:0 0 16px;line-height:1.55;">
                <strong th:text="${customerName}">Name</strong><br />
                <span style="color:#666;" th:text="${customerEmail}">email</span><br />
                <span style="color:#666;">📞 <span th:text="${order.shippingPhone}">phone</span></span>
              </p>

              <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:#7b5ea7;margin:0 0 8px;">Ship to</h2>
              <p style="font-size:14px;margin:0 0 16px;line-height:1.55;">
                <span th:text="${order.shippingName}">Name</span><br />
                <span th:text="${order.shippingAddress}">Address</span><br />
                <span th:text="${order.shippingCity}">City</span> -
                <span th:text="${order.shippingPincode}">Pincode</span>
              </p>

              <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:#7b5ea7;margin:0 0 8px;">Items</h2>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr th:each="item : ${order.items}">
                  <td style="padding:8px 0;border-bottom:1px solid #f0f0f5;font-size:14px;">
                    <span th:text="${item.productEmoji} ?: '💎'">💎</span>
                    <span style="font-weight:600;" th:text="${item.productName}">Bracelet</span>
                    <span style="color:#888;"> × <span th:text="${item.quantity}">1</span></span>
                  </td>
                  <td style="padding:8px 0;border-bottom:1px solid #f0f0f5;font-size:14px;text-align:right;white-space:nowrap;">
                    ₹<span th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')}">799</span>
                  </td>
                </tr>
              </table>

              <p style="font-size:14px;margin:14px 0 20px;text-align:right;">
                Subtotal ₹<span th:text="${#numbers.formatDecimal(order.subtotal, 0, 'COMMA', 0, 'POINT')}">2297</span>
                · Shipping
                <span th:text="${order.shipping.signum() == 0} ? 'Free' : ('₹' + ${#numbers.formatDecimal(order.shipping, 0, 'COMMA', 0, 'POINT')})">Free</span>
                · <strong>Total ₹<span th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 0, 'POINT')}">2297</span></strong>
              </p>

              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0;">
                <tr>
                  <td style="background:#7b5ea7;border-radius:8px;">
                    <a th:href="${adminUrl}" href="#"
                       style="display:inline-block;padding:10px 22px;color:#ffffff;font-weight:700;text-decoration:none;font-size:14px;">
                      Open admin panel →
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="background:#fafbff;padding:14px 24px;text-align:center;font-size:12px;color:#888;">
              Status: <strong th:text="${order.status}">PENDING</strong> · Cash on Delivery
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
