spring.application.name=shubhcrystals-backend
server.port=8081

# Database — set these env vars in production, or use application-local.properties for local dev
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS
shubhcrystals.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
