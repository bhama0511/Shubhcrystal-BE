spring.application.name=shubhcrystals-backend
server.port=8080

# H2 in-memory database (replace with MySQL/PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:shubhcrystalsdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console for local development (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS allowed origin for local frontend dev
shubhcrystals.cors.allowed-origins=http://localhost:3000
