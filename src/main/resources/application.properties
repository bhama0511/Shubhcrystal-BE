spring.application.name=shubhcrystals-backend
server.port=8081

# Database — set these env vars in production, or use application-local.properties for local dev
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS
shubhcrystals.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}

# Cloudinary — set env vars in production, use application-local.properties locally
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Allow up to 10 MB image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Email (SMTP) ──
# Production: Brevo. Override SMTP_HOST/PORT/USERNAME/PASSWORD via env vars.
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Disable Thymeleaf template caching in dev only (set true in prod)
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# App-level email config
app.email.from-address=${EMAIL_FROM_ADDRESS:noreply@shubhcrystals.com}
app.email.from-name=${EMAIL_FROM_NAME:ShubhCrystals}
app.email.admin-recipients=${EMAIL_ADMIN_RECIPIENTS:admin@shubhcrystals.com}
app.frontend-base-url=${FRONTEND_BASE_URL:https://shubhcrystals.com}
